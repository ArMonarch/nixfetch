name: Build and Release nixfetch

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-latest

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build package
        run: nix build .#default

      - name: Rename binary
        run: cp result/bin/nixfetch nixfetch-${{ matrix.system }}

      - uses: actions/upload-artifact@v4
        with:
          name: nixfetch-${{ matrix.system }}
          path: nixfetch-${{ matrix.system }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get version from package.nix
        id: version
        run: |
          version=$(grep 'version' nix/package.nix | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.version.outputs.version }}"

          # Delete existing release and tag if they exist
          gh release delete "$tag" --yes 2>/dev/null || true
          git push origin :"refs/tags/$tag" 2>/dev/null || true

          gh release create "$tag" \
            --title "nixfetch $tag" \
            --generate-notes \
            artifacts/*
